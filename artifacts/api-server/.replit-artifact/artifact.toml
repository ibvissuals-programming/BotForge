kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

# ⚠️  CRITICAL — do NOT rename this section.
# [services.env] is the only section Replit recognises for injecting env vars
# into the production run process. Any other name (e.g. [services.production.run.env])
# is silently ignored, PORT is never set, index.ts throws before app.listen() is
# called, and the deployment fails with "not all artifact ports opened" / SIGTERM.
[services.env]
PORT = "8080"
NODE_ENV = "production"

[services.production]

[services.production.build]
# secrets:check runs first — exits 1 (blocking the build) if any required
# secret (GROQ_API_KEY, BOTFORGE_CEO_PASSWORD, DATABASE_URL) is missing.
# DATABASE_URL hostname is NOT validated here; Replit injects its own
# production URL and we must trust its format.
args = ["sh", "-c", "pnpm run secrets:check && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.health.startup]
path = "/api/healthz"
