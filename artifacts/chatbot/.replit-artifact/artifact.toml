kind = "web"
previewPath = "/"
title = "Business Chatbot"
version = "1.0.0"
id = "artifacts/chatbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/chatbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatbot", "run", "build" ]

[services.production.run]
# og-server.mjs replaces the static file server so it can inject per-business
# Open Graph meta tags before link-preview scrapers (WhatsApp, Twitter, etc.)
# read the response. Serves static assets directly and falls back to index.html.
args = ["node", "artifacts/chatbot/og-server.mjs"]

[services.env]
PORT = "3000"
BASE_PATH = "/"
